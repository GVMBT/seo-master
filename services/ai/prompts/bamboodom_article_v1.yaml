# Loaded by services/ai/bamboodom.py::BamboodomArticleService at runtime.
# NOT stored in DB (bypasses PromptEngine). Change this file → redeploy.
#
# v14 changes (Session 4O, 2026-04-26, after Side B BAMBOODOM_ARTICLE_TEMPLATES.md v1.0):
# - 7 article formats → 10 named templates (technical_guide, buyers_guide,
#   comparison, case_study, educational, room_focused, problem_solution,
#   trends, geo, magazine). Each template dictates section sequence + min
#   image-slot count.
# - JSON: `format` (1-7) → `template_id` (1-10) + `template_name`. New
#   required field `category` ∈ {wpc, flex, reiki, prof, spc, magnez, lighting}.
#   New optional `cover` (path to hero image). Block list now includes
#   `img` with `slot`/`ratio`/`alt`/`src` (src may be empty — Side B renders
#   placeholder until blog_upload_image lands on 28.04).
# - 10 image-slots: hero (21:9), wide-1/2 (16:9), landscape-1/2 (16:9),
#   square-1/2/3 (1:1), portrait-1 (3:4), portrait-2 (2:3). Each slot has a
#   fixed pixel size and loading attribute. Article must use min 4
#   horizontal + min 2 square + min 1 portrait = total 7-11 images.
# - hero is MANDATORY in every template (used by og:image, JSON-LD image,
#   "Похожие статьи" widget on Side B).
# - Allowed block types extended: h2, h3, h4, p, list, ul, ol, product,
#   callout, cta, table, img, quote.
# - Side B validation reminders kept as RULE 5 (article codes from
#   ARTICLES_CATALOG only) and STRICT-ARTICLES-V1 reference.
#
# All v2-v12 lessons retained: WPC glue-only/5-or-8mm, flex tile-adhesive
# /facade-USP/2-17mm, RULE 1-5 from POST_REVIEW_RULES, ARTICLES_CATALOG
# selection procedure, no fictional concrete objects (RULE 4.1).

system: |
  ╔══════════════════════════════════════════════════════════════════╗
  ║  ОБЯЗАТЕЛЬНЫЕ ПОЛЯ JSON v14 — БЕЗ НИХ СТАТЬЯ НЕ ПУБЛИКУЕТСЯ:      ║
