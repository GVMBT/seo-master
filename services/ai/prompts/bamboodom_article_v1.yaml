  <ДЛИНА_СТАТЬИ>
  ЖЁСТКИЕ ГРАНИЦЫ: минимум **1500 слов**, максимум **2200 слов** в блоках
  `p` + `h2`/`h3`/`h4` + `list`/`ul`/`ol` + `callout.text` + `quote.text`.
  Блоки `product`, `cta`, `img`, `table.header`/`rows` — НЕ считаются в
  длину.

  TARGET: 1700-1900 слов.

  ПЕРЕД ОТВЕТОМ проверь себя:
  1. Сложи все слова во всех текстовых блоках.
  2. Если <1500 — расширь самый короткий раздел ФАКТИЧЕСКИМ содержанием
     из KNOWLEDGE_BASE (примеры, технические детали, сценарии).
  3. Если >2200 — сократи избыточные параграфы, сохрани ключевые факты.

  ЗАПРЕЩЕНО:
  - Наполнять текст «водой» чтобы добрать до минимума (повторы, общие фразы)
  - Придумывать факты (проценты, годы, исследования) для объёма
  - Урезать важные предупреждения чтобы влезть в максимум

  В поле `word_count` JSON-ответа укажи своё честное измерение длины.
  </ДЛИНА_СТАТЬИ>

  <POST_REVIEW_RULES>
  Правила на основе ревью production-статей и smoke-тестов:

  **RULE 1 — LIST vs TABLE**
  Блок `list` (или `ul`/`ol`) используется только для 4+ однородных пунктов
  (советы, этапы, характеристики одного материала). Для 2-3 параллельных
  позиций (сравнение X vs Y, альтернативы, этапы A и B) — используй
  **`table`** с разбивкой по колонкам. `list` из 2 пунктов — запрещено.

  **RULE 2 — PRODUCT PODVODKA**
  Подводка к product-блоку должна следовать одному из трёх шаблонов:
  (a) конкретный сценарий на типовом объекте
      («На проекте гостиной 22 м² TK029P создал ощущение натурального дерева...»)
  (b) технические характеристики артикула — из ARTICLES_CATALOG.
      («TK029P — серия P с белым наполнителем, 5 мм, текстура wood. Подходит для...»)
  (c) решение конкретной проблемы выбора
      («Главная проблема WPC под натуральное дерево — монотонность. TK029P
      решён мелким переливом волокон...»)

  ЗАПРЕЩЕНЫ шаблонные связки: «отлично подойдёт», «обратите внимание»,
  «станет акцентом», «рекомендуем рассмотреть», «стоит обратить внимание».

  **RULE 3 — ФИНАЛЬНЫЙ ПАРАГРАФ**
  Параграф перед CTA должен добавлять НОВУЮ информацию, не повторять
  статью. Варианты:
  - краткая матрица решения («Влажность + криволинейность = флекс. Прямые
    стены в сухих зонах = WPC.»)
  - предупреждение о типичных ошибках («Что точно не делать: WPC на фасаде,
    флекс на полу»)
  - уникальное наблюдение/инсайт

  ЗАПРЕЩЕНЫ клише: «наши специалисты помогут подобрать», «зависит от условий
  эксплуатации», «оптимальное решение для любых задач», «индивидуальный
  подход к каждому клиенту».

  **RULE 4 — ЦИФРЫ, СРОКИ, ТЕМПЕРАТУРЫ, ПРОЦЕНТЫ, РАЗМЕРЫ**
  Конкретные числовые значения допустимы ТОЛЬКО если они есть в
  KNOWLEDGE_BASE или в полях ARTICLES_CATALOG (size, thick_mm, sizes,
  width_mm, length_mm). Если числа нет — переформулируй общими словами
  или НЕ упоминай факт вообще. Выдумывать числа ЗАПРЕЩЕНО.

  ЗАПРЕЩЕНО придумывать:
  - Расход материалов («300-350 г/м²», «3-5 кг/м²»)
  - Сроки службы («25 лет», «30+ лет», «прослужит N лет»)
  - Проценты улучшения («на 30-40% лучше», «на 35% выше адгезия»)
  - Температурные диапазоны («от -50°C до +80°C») — только если в KB
  - Цены в рублях («150-200 руб/м²», «около 300 ₽») — цены ТОЛЬКО через product-блок
    (поле `price_yuan` в каталоге — закупочная цена в юанях, в текст не выносим)
  - «Испытания», «сертификаты», «тесты», «лабораторные замеры» — если их
    нет у Дизайн-Сервис в KB

  Правильные замены (если число нужно, но его нет в KB):

  ✗ «расход клея 300-350 г/м²»
  ✓ «расход клея зависит от толщины панели и ровности основания — уточните у менеджера»

  ✗ «срок службы 25 лет»
  ✓ «материал долговечен при правильном монтаже»

  ✗ «выдерживает от -50°C до +80°C»
  ✓ «подходит для всех климатических зон России»

  ✗ «подтверждено испытаниями на UV-старение»
  ✓ «декоративный слой устойчив к выцветанию»

  **RULE 4.1 — ВЫДУМАННЫЕ КОНКРЕТНЫЕ ОБЪЕКТЫ ЗАПРЕЩЕНЫ**

  Сторона B (издатель) выделила это в отдельную метрику качества: даже
  ОДИН выдуманный конкретный объект в партии = провал. Валидатор не
  ловит это автоматически (нет regex), но при ревью объект сразу видно.

  ЗАПРЕЩЕНО:
  - «Отель в Сочи на 32 номера», «бизнес-центр в Москве 12 000 м²»,
    «ресторан Метрополь зона коктейль-бара», «офис в Сити башня Меркурий»
  - Имена реальных или выдуманных компаний/брендов в кейсах
    («сеть Ритм-холдинг», «гостиница Ангелика»)
  - Имена дизайнеров и архитекторов с указанием авторства
  - Конкретные адреса, метраж конкретных помещений, числовые показатели
    проектов (сроки сдачи, бюджет, площадь конкретного объекта)
  - Имена клиентов или цитаты от их имени

  РАЗРЕШЕНО:
  ✓ Обобщённый сценарий: «типовой офис open-space на 100-150 человек»,
    «гостиница среднего сегмента с 50-80 номерами», «небольшая кофейня
    на 30-40 посадочных мест»
  ✓ Описание ситуации без привязки: «акцентная стена за барной стойкой»,
    «коридор с высоким трафиком», «зона ресепшн в бизнес-центре»

  ПРИНЦИП: если читатель может погуглить упомянутый объект и не найти —
  это галлюцинация. Пиши ТИПОВЫЕ ситуации, не выдуманные конкретные.

  Этот RULE особенно важен для ШАБЛОНА 4 (case_study) — там описывай
  объект максимально обобщённо. Например «коммерческое помещение
  площадью около 60 м² в формате lounge-кафе» — это ОК. «Кафе Утро на
  Невском 18, 62 м²» — это галлюцинация.

  **RULE 5 — АРТИКУЛЫ И ВЫБОР ИЗ КАТАЛОГА**

  Конкретные артикулы (`TK###A`, `F###`, `R###`, `XHS-*`) в ЛЮБОМ
  тексте статьи — параграф, заголовок, список, callout, title, excerpt,
  alt-текст изображения — допустимы ТОЛЬКО если этот код буквально есть
  в ARTICLES_CATALOG ниже.

  Код, которого нет в ARTICLES_CATALOG, — ГАЛЛЮЦИНАЦИЯ.
  Сервер-валидатор сверит каждое упоминание артикула во всех
  текстовых блоках с каталогом и заблокирует публикацию если найдёт
  несуществующий код. На стороне B это правило усилено маркером
  STRICT-ARTICLES-V1: production-публикация с unknown article codes →
  HTTP 422 + аварийка в TG.

  **ПРОЦЕДУРА ВЫБОРА АРТИКУЛА** (используй именно её, не угадывай номер):

  Шаг 1 — определи нужную категорию:
  - тема про панели, дерево, камень в интерьере → wpc
  - фасад, крупная декоративная плитка, гнутая поверхность → flex
  - реечный декор, акцентная стена, зонирование рейками → reiki
  - монтажный профиль, стык, плинтус, кромка → prof

  Шаг 2 — внутри категории сузь поиск по `texture_type` (для wpc) или
  `series_label` (для flex/reiki/profiles). Например статья про мрамор:
  ищи в wpc артикулы с `texture_type: marble` (серия S) или в flex —
  Travertine/Stone-коллекции.

  Шаг 3 — открой `name` и `description` артикула. Если name даёт
  конкретное имя («Дуб классический», «Travertino») — упоминай его в
  подводке. Если description непустой — он содержит фактическую
  характеристику, которую можно процитировать (но не приукрашивая).

  Шаг 4 — если ничего не подошло, не выдумывай. Опиши группу:
  «светлые декоры серии P с текстурой wood», «коллекция Travertine
  гибкой керамики». Конкретный артикул появится в product-блоке только
  если в каталоге он реально есть.

  ЗАПРЕЩЕНО:
  ✗ Додумывать `TK042A` если в каталоге для серии A есть только
    `TK001A-TK012A, TK110A-TK112A, TK157A-TK159A, TK187A-TK195A`
  ✗ Брать `F002` если в каталоге начало с `F001` — пропуск номеров OK,
    но угадывать «логичный F099» нельзя
  ✗ Изобретать суффиксы XHS-профилей (XHS-WPC25, XHS-20). В каталоге
    префиксы зафиксированы списком в ARTICLES_CATALOG.

  ОСОБЫЙ СЛУЧАЙ — ВСПОМОГАТЕЛЬНЫЕ МАТЕРИАЛЫ В PROSE:
  В статье про WPC можно упомянуть «алюминиевые XHS-профили для стыков»
  без конкретного кода — это не галлюцинация. Конкретный код вставляй
  только в product-блок и только если он есть в каталоге.

  **ПАТТЕРН «ЭКСТРАПОЛЯЦИЯ» — ТИПИЧНАЯ ОШИБКА:**
  AI видит в каталоге `TK029P, TK110A, TK112A, TK157A` и додумывает
  «промежуточный логичный номер» — например `TK042A`. Это ГАЛЛЮЦИНАЦИЯ.
  Пропуски в нумерации серии — нормальная реальность каталога,
  «заполнять дыры» НЕЛЬЗЯ.

  **СТРОГИЙ ЗАПРЕТ НА XHS-СУФФИКСЫ:**
  Префиксы XHS-профилей в каталоге ФИКСИРОВАННЫЕ — те что буквально
  присутствуют в ARTICLES_CATALOG. Не существует и НЕ должно появляться
  в тексте никаких:
  - `XHS-U5`, `XHS-U8` (выдуманные толщинные суффиксы)
  - `XHS-WPC25`, `XHS-WPC20` (выдуманные «логичные» суффиксы)
  - `XHS-T8`, `XHS-T10` если их нет в каталоге

  Если хочешь упомянуть профиль для определённой толщины, пиши обобщённо:
  «алюминиевые XHS-профили для стыков WPC-панелей толщиной 5 мм»
  («-U5» в конец НЕ ДОБАВЛЯЙ — такого кода нет, ты его выдумываешь).
  Конкретный код — только в product-блоке и только если он буквально
  есть в ARTICLES_CATALOG.

  Сервер-валидатор v14.1 ловит ЛЮБЫЕ коды в тексте по regex (TK###X,
  F###, R###, XHS-*) и блокирует их если они не из каталога. Поймать
  такие коды в чек-листе → это retry: модель должна перегенерировать
  JSON с фиксом. Не наступай на эти грабли.

  ПРИНЦИП: ARTICLES_CATALOG — это НЕ шаблон «серия A = 001-200», это
  ТОЧНЫЙ список доступных номеров с названиями и описаниями. Отсутствие
  номера в списке = его не существует в каталоге = НЕ ПРИДУМЫВАТЬ.
  </POST_REVIEW_RULES>

