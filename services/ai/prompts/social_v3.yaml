meta:
  task_type: social_post
  version: v3
  model_tier: budget
  max_tokens: 2000
  temperature: 0.7

system: |
  Ты — SMM-копирайтер. Пиши на <<language>>.
  Компания: <<company_name>> (<<specialization>>).
  <% if company_description %>О компании: <<company_description>>.<% endif %>
  <% if advantages %>Преимущества: <<advantages>>.<% endif %>
  <% if experience %>Опыт: <<experience>>.<% endif %>
  <% if website_url %>Сайт: <<website_url>>.<% endif %>

user: |
  Напиши пост для <<platform>> на тему "<<keyword>>".

  Требования:
  - Стиль: <<text_style>>
  <% if platform == "pinterest" %>
  - СТРОГО: text + хештеги суммарно до 500 символов. Оставь ~100 символов на хештеги.
  - pin_title до 100 символов: включи ключевик + конкретику (цена, срок, цифра).
    Хорошо: "Кухня на заказ от 120 000 ₽ — 25 дней от замера до монтажа"
    Плохо: "Преимущества кухонь на заказ для вашего дома"
  - description: 2-3 предложения с ключевыми словами и цифрами.
    Последнее предложение — призыв к действию.
  - Хештеги: 3-5 штук, нишевые и конкретные. Не generic (#бизнес, #успех).
  <% elif platform == "telegram" %>
  - Длина: <<words_min>>-<<words_max>> слов
  - HTML-разметка: <b>, <i>, <a href="...">, макс. 4096 символов
  - Призыв к действию в конце
  <% elif platform == "vk" %>
  - Длина: <<words_min>>-<<words_max>> слов
  - Текст + хештеги, макс. 16 384 символов
  - Призыв к действию в конце
  <% endif %>
  <% if prices_excerpt %>- Упомяни цены: <<prices_excerpt>><% endif %>
  - Ключевая фраза "<<keyword>>" — в первом предложении

  Формат ответа — JSON:
  {
    "text": "...",
    "hashtags": ["...", "..."],
    "pin_title": "..."
  }

variables:
  - name: keyword
    source: categories.keywords (selected phrase)
    required: true
  - name: platform
    source: telegram, vk, pinterest
    required: true
  - name: company_name
    source: projects.company_name
    required: true
  - name: specialization
    source: projects.specialization
    required: true
  - name: advantages
    source: projects.advantages
    required: false
    default: ""
  - name: company_description
    source: projects.description
    required: false
    default: ""
  - name: experience
    source: projects.experience
    required: false
    default: ""
  - name: website_url
    source: projects.website_url
    required: false
    default: ""
  - name: language
    source: users.language
    required: true
    default: "ru"
  - name: text_style
    source: text_settings.style
    required: true
    default: "Разговорный"
  - name: words_min
    source: text_settings
    required: true
    default: 100
  - name: words_max
    source: text_settings
    required: true
    default: 300
  - name: prices_excerpt
    source: categories.prices
    required: false
    default: ""
